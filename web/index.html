<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mars — Voxel Terrain</title>
<style>
body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; cursor: grab; }
canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="c" width="320" height="200"></canvas>
<script src="mars.js"></script>
<script>
"use strict";

// === Palette (ABGR for canvas) ===
const palette = new Uint32Array(256);
for (let i = 0; i < 97; i++) {
    const r = (PAL6[i*3] << 2) | (PAL6[i*3] >> 4);
    const g = (PAL6[i*3+1] << 2) | (PAL6[i*3+1] >> 4);
    const b = (PAL6[i*3+2] << 2) | (PAL6[i*3+2] >> 4);
    palette[i] = 0xFF000000 | (b << 16) | (g << 8) | r;
}

// === Canvas ===
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.style.width = (320 * 3) + 'px';
canvas.style.height = (200 * 3) + 'px';
const SW = 320;
const imgData = ctx.createImageData(SW, H);
const pixels = new Uint32Array(imgData.data.buffer);

// === Seed from URL or random ===
const seed = (() => {
    const p = new URLSearchParams(location.search);
    return p.has('seed') ? parseInt(p.get('seed')) & 0x7FFF : (Date.now() * 7) & 0x7FFF;
})();

function bufSum(buf) { let s = 0; for (let i = 0; i < buf.length; i++) s += buf[i]; return s; }

console.log('seed:', seed);
const mars = createMars(seed);
console.log('colormap  checksum:', bufSum(mars.colormap));
console.log('heightmap checksum:', bufSum(mars.heightmap));
console.log('slopemap  checksum:', bufSum(mars.slopemap));

// Camera
let posX = 1000, posY = 1000;

let firstFrame = true;
function frame() {
    mars.render(posX, posY);
    if (firstFrame) {
        firstFrame = false;
        const h = mars.cameraHeight(posX | 0, posY | 0);
        console.log('renderBuf checksum:', bufSum(mars.renderBuf));
        console.log('camera: posX=%d posY=%d heading=0x%s', posX, posY, h.toString(16));
    }

    // Blit to 320-wide screen (centered at cols 32-287)
    pixels.fill(0xFF000000);
    for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
            pixels[y * SW + x + 32] = palette[mars.renderBuf[y * W + x]];
        }
    }

    // Compass indicator (matching binary pixel positions)
    const cc = palette[0x60];
    for (const [y,x] of [
        [199,310],[199,313],[199,314],[199,317],[199,318],[199,319],
        [198,310],[198,314],[198,317],
        [197,309],[197,310],[197,311],[197,313],[197,314],[197,315],[197,317],[197,318],[197,319]
    ]) pixels[y * SW + x] = cc;

    ctx.putImageData(imgData, 0, 0);
    requestAnimationFrame(frame);
}

// === Input ===
let mouseDown = false, lastMX = 0, lastMY = 0;
canvas.addEventListener('mousedown', e => { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; e.preventDefault(); });
window.addEventListener('mouseup', () => mouseDown = false);
window.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
    lastMX = e.clientX; lastMY = e.clientY;
    posX = (posX + dx) | 0;
    posY = (posY - dy) | 0;
});
canvas.addEventListener('touchstart', e => {
    const t = e.touches[0]; lastMX = t.clientX; lastMY = t.clientY; e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const dx = t.clientX - lastMX, dy = t.clientY - lastMY;
    lastMX = t.clientX; lastMY = t.clientY;
    posX = (posX + dx) | 0; posY = (posY - dy) | 0;
    e.preventDefault();
}, {passive:false});
window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') posX = (posX - 80) | 0;
    if (e.key === 'ArrowRight' || e.key === 'd') posX = (posX + 80) | 0;
    if (e.key === 'ArrowUp' || e.key === 'w') posY = (posY + 80) | 0;
    if (e.key === 'ArrowDown' || e.key === 's') posY = (posY - 80) | 0;
    if (e.key === 'p') {
        // Download 256x200 render buffer as PNG (matches compare.js output)
        const c2 = document.createElement('canvas');
        c2.width = W; c2.height = H;
        const ctx2 = c2.getContext('2d');
        const img2 = ctx2.createImageData(W, H);
        const px = new Uint32Array(img2.data.buffer);
        for (let i = 0; i < W * H; i++) px[i] = palette[mars.renderBuf[i]];
        ctx2.putImageData(img2, 0, 0);
        const a = document.createElement('a');
        a.download = `mars_seed${seed}.png`;
        a.href = c2.toDataURL('image/png');
        a.click();
    }
});

frame();
</script>
</body>
</html>
